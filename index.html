<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museums Fotobox</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        video { width: 100%; height: 80vh; object-fit: cover; background: #222; }
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; transition: opacity 0.1s ease; }
        .trigger-flash { opacity: 1 !important; }
        #status { font-size: 1.5rem; margin-top: 10px; }
        canvas { display: none; }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <div id="flash"></div>
    <div id="status">Bereit... Drücke den Button!</div>
    <canvas id="photoCanvas"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('photoCanvas');
        const statusText = document.getElementById('status');
        const flash = document.getElementById('flash');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { 
                statusText.innerText = "Kamera-Fehler: " + err.message;
            });

        function takePhoto() {
            statusText.innerText = "CHEESE! 📸";
            flash.classList.add('trigger-flash');
            setTimeout(() => flash.classList.remove('trigger-flash'), 150);

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            setTimeout(() => { statusText.innerText = "Bereit für das nächste Foto..."; }, 2000);
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === '1') {
                takePhoto();
            }
        });
    </script>
</body>
</html>
